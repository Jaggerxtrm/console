[changelog]
header = ""
body = """
{% if version %}## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}{% else %}## [Unreleased]{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- **{{ commit.message | upper_first }}** ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/Jaggerxtrm/console/commit/{{ commit.id }})) — {{ commit.author.timestamp | date(format="%Y-%m-%d %H:%M") }}
{% if commit.body %}
{{ commit.body | trim | indent(prefix="  ", first=true) }}
{% endif %}
{% endfor %}{% endfor %}
"""
trim = false
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
# Generic type grouping. Add repo-specific SCOPE parsers above these — see the P0 bead.
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^perf", group = "Performance" },
  { message = "^(docs|chore|build|ci|test|refactor|style)", group = "Project maintenance" },
  { message = "^v?[0-9]+\\.[0-9]+\\.[0-9]+$", skip = true },
  { message = ".*", group = "Other changes" },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v?[0-9].*"

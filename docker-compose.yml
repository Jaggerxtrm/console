services:
  gitboard:
    container_name: gitboard
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      PORT: "3000"
      GITBOARD_DATA_DIR: /data
      XDG_PROJECTS_DIR: /projects
    volumes:
      - gitboard-state:/data
      - ${HOME}/projects:/projects:ro

volumes:
  gitboard-state:
